name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v27
      with:
        nix_path: nixpkgs=channel:nixos-unstable

    - name: Check Flake
      run: nix flake check

    - name: Build
      run: nix build .#zt

    - name: ZT Contract Gate
      run: |
        chmod +x scripts/ci/check-zt-contract-gate.sh
        ./scripts/ci/check-zt-contract-gate.sh

    - name: v0.8.0 Core Gate
      run: |
        chmod +x scripts/ci/check-v080-core-gate.sh
        ./scripts/ci/check-v080-core-gate.sh

    - name: Control Plane Contract Gate
      run: |
        chmod +x scripts/ci/check-control-plane-contract-gate.sh
        ./scripts/ci/check-control-plane-contract-gate.sh

    - name: Supply-Chain Setup JSON Gate (fixture)
      env:
        ZT_BIN: ${{ github.workspace }}/result/bin/zt
      run: |
        chmod +x scripts/ci/check-zt-setup-json-gate.sh
        ./scripts/ci/check-zt-setup-json-gate.sh

    - name: Policy Rollout Gate
      run: |
        chmod +x scripts/ci/check-policy-rollout-gate.sh
        ./scripts/ci/check-policy-rollout-gate.sh

    - name: Supply-Chain Setup JSON Gate (actual repo; fail-closed when artifacts exist)
      env:
        ZT_BIN: ${{ github.workspace }}/result/bin/zt
        ZT_SECURE_PACK_ROOT_PUBKEY_FINGERPRINTS: ${{ vars.ZT_SECURE_PACK_ROOT_PUBKEY_FINGERPRINTS != '' && vars.ZT_SECURE_PACK_ROOT_PUBKEY_FINGERPRINTS || secrets.ZT_SECURE_PACK_ROOT_PUBKEY_FINGERPRINTS }}
      run: |
        chmod +x scripts/ci/check-zt-setup-json-actual-gate.sh
        ./scripts/ci/check-zt-setup-json-actual-gate.sh

    - name: Run Integration Tests
      run: |
        chmod +x test/integration.sh
        ./test/integration.sh --client local-smoketest
