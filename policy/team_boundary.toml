# v0.9.2 Team/Enterprise Boundary policy
# Set enabled=true to enforce recipient/signer/share-route boundary contracts.
enabled = false

tenant_id = "corp-example"
team_id = "secops"
boundary_policy_version = "2026-02-26"

allowed_recipients = ["clientA", "clientB"]
allowed_signer_fingerprints = [
  "0123456789ABCDEF0123456789ABCDEF01234567",
