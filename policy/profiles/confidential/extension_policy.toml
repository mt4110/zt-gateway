# Trust profile: confidential (stricter size envelope)

max_size_mb = 25
force_rebuild = false

force_rebuild_extensions = [
  ".jpg",
  ".jpeg",
  ".png",
  ".pdf",
  ".docx",
  ".xlsx",
  ".pptx"
]

deny_extensions = [
  ".exe",
  ".bat",
  ".cmd",
  ".com",
  ".scr",
  ".ps1",
  ".zip",
  ".7z",
  ".rar",
  ".tar",
  ".gz",
  ".tgz"
]

scan_only_extensions = [
  ".txt",
  ".md",
  ".csv",
  ".json"
]

scan_rebuild_extensions = [
  ".jpg",
  ".jpeg",
  ".png",
  ".pdf",
  ".docx",
  ".xlsx",
  ".pptx"
]
