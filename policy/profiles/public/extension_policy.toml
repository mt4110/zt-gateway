# Trust profile: public (sharing-priority baseline)
# Keep deny-list fail-closed while allowing broader operational flexibility.

max_size_mb = 100
force_rebuild = false

force_rebuild_extensions = [
  ".jpg",
  ".jpeg",
  ".png"
]

deny_extensions = [
  ".exe",
  ".bat",
  ".cmd",
  ".com",
  ".scr",
  ".ps1",
  ".zip",
  ".7z",
  ".rar",
  ".tar",
  ".gz",
  ".tgz"
]

scan_only_extensions = [
  ".txt",
  ".md",
  ".csv",
  ".json",
  ".pdf",
  ".docx",
  ".xlsx",
  ".pptx"
]

scan_rebuild_extensions = [
  ".jpg",
  ".jpeg",
  ".png"
]
