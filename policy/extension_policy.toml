# zt-gateway extension policy (zt-side orchestration policy)
#
# Categories:
# - deny_extensions: blocked before scan
# - scan_only_extensions: scan and pass-through (no secure-rebuild)
# - scan_rebuild_extensions: scan + secure-rebuild required before pack
#
# Unknown or missing extensions are denied by default (fail closed).

# zt-side size cap (applied before pack)
max_size_mb = 50

# Deprecated global switch (kept for compatibility). Prefer force_rebuild_extensions.
force_rebuild = false

# Extensions that must use SCAN_REBUILD mode. If listed here but mapped to SCAN_ONLY,
# zt blocks the file until policy/mode is aligned.
force_rebuild_extensions = [
  ".jpg",
  ".jpeg",
  ".png"
]

deny_extensions = [
  ".exe",
  ".bat",
  ".cmd",
  ".com",
  ".scr",
  ".ps1",
  ".zip",
  ".7z",
  ".rar",
  ".tar",
  ".gz",
  ".tgz"
]

scan_only_extensions = [
  ".txt",
  ".md",
  ".csv",
  ".json",
  ".pdf",
  ".docx",
  ".xlsx",
  ".pptx"
]

scan_rebuild_extensions = [
  ".jpg",
  ".jpeg",
  ".png"
]
