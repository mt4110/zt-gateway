services:
  postgres:
    image: postgres:16-alpine
    container_name: zt-control-plane-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zt_control_plane
      POSTGRES_USER: zt
      POSTGRES_PASSWORD: zt-dev-password
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zt -d zt_control_plane"]
      interval: 5s
      timeout: 3s
      retries: 20
