<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">zt-gateway minimal demo</title>
  <desc id="desc">Two terminal panels showing sender and receiver commands for zt send and zt verify.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3f7fb"/>
      <stop offset="100%" stop-color="#e7eef6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="520" fill="url(#bg)"/>
  <text x="60" y="58" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    zt-gateway: shortest sender/receiver flow
  </text>
  <text x="60" y="88" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15" fill="#334155">
    Sender runs zt send. Receiver runs zt verify. Internal scan / rebuild / pack / verify happens automatically.
  </text>

  <g transform="translate(56,120)" filter="url(#shadow)">
    <rect width="520" height="340" rx="14" fill="#0b1220"/>
    <rect width="520" height="34" rx="14" fill="#111827"/>
    <rect y="20" width="520" height="14" fill="#111827"/>
    <circle cx="20" cy="17" r="5.5" fill="#ef4444"/>
    <circle cx="38" cy="17" r="5.5" fill="#f59e0b"/>
    <circle cx="56" cy="17" r="5.5" fill="#22c55e"/>
    <text x="86" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#cbd5e1">sender terminal</text>

    <text x="22" y="66" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#93c5fd">$ zt setup</text>
    <text x="22" y="94" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#a7f3d0">[OK] zt_client config loaded</text>
    <text x="22" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#fde68a">[WARN] control_plane_url is empty</text>
    <text x="22" y="152" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#93c5fd">$ zt send --client acme ./safe.txt</text>
    <text x="22" y="180" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#cbd5e1">[Step 1/3] Scanning...</text>
    <text x="22" y="202" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#cbd5e1">[Step 2/3] Sanitizing...</text>
    <text x="22" y="224" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#cbd5e1">[Step 3/3] Packing...</text>
    <text x="22" y="258" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#a7f3d0">[SUCCESS] Packet generated</text>
    <text x="22" y="280" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#bfdbfe">[SHARE] Receiver command example:</text>
    <text x="22" y="302" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#dbeafe">zt verify ./bundle_acme_20260224T000000Z.spkg.tgz</text>
  </g>

  <g transform="translate(624,120)" filter="url(#shadow)">
    <rect width="520" height="340" rx="14" fill="#0b1220"/>
    <rect width="520" height="34" rx="14" fill="#111827"/>
    <rect y="20" width="520" height="14" fill="#111827"/>
    <circle cx="20" cy="17" r="5.5" fill="#ef4444"/>
    <circle cx="38" cy="17" r="5.5" fill="#f59e0b"/>
    <circle cx="56" cy="17" r="5.5" fill="#22c55e"/>
    <text x="86" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#cbd5e1">receiver terminal</text>

    <text x="22" y="66" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#93c5fd">$ zt verify ./bundle_acme_20260224T000000Z.spkg.tgz</text>
    <text x="22" y="100" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#cbd5e1">[VERIFY] Packet: bundle_acme_...</text>
    <text x="22" y="122" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#a7f3d0">[PASS] Signature and checksum verified</text>
    <text x="22" y="144" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#a7f3d0">[VERIFIED] Trust established</text>
    <text x="22" y="190" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#cbd5e1">Optional:</text>
    <text x="22" y="212" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#cbd5e1">  zt doctor</text>
    <text x="22" y="234" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#cbd5e1">  zt --help-advanced</text>
  </g>
</svg>

